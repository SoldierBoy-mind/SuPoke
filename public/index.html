<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuPoke — Pokémon Type Puzzle</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<div class="app">

  <header class="app-header">
    <h1>SuPoke</h1>
    <p class="subtitle">A Sudoku-style logic puzzle based on Pokémon type effectiveness</p>
  </header>

  <main class="app-main">

    <!-- ── Controls ──────────────────────────────────────────────────────── -->
    <section class="card controls-card">
      <div class="size-selector">
        <span class="label">Grid size</span>
        <div class="size-buttons" role="group" aria-label="Grid size">
          <button class="size-btn active" data-n="3">3 × 3</button>
          <button class="size-btn"        data-n="4">4 × 4</button>
          <button class="size-btn"        data-n="5">5 × 5</button>
        </div>
      </div>
      <button id="generate-btn" class="btn btn-primary">Generate Puzzle</button>
    </section>

    <!-- ── Status bar ─────────────────────────────────────────────────────── -->
    <div id="status" class="status-bar" role="status" aria-live="polite"></div>

    <!-- ── Puzzle area (hidden until a puzzle is generated) ───────────────── -->
    <div id="puzzle-area" hidden>

      <!-- Active types -->
      <section class="card">
        <h2 class="section-title">Active Types</h2>
        <div id="types-display" class="types-list"></div>
      </section>

      <!-- Effectiveness matrix (collapsible) -->
      <section class="card">
        <button id="matrix-toggle" class="collapsible-header"
                aria-expanded="false" aria-controls="matrix-content">
          <span>Effectiveness Matrix</span>
          <span class="chevron" aria-hidden="true">›</span>
        </button>
        <div id="matrix-content" class="collapsible-body" hidden>
          <p class="matrix-hint">
            Row&thinsp;=&thinsp;attacker &nbsp;·&nbsp; Column&thinsp;=&thinsp;defender
            &nbsp;&nbsp;
            <span class="legend">
              <span class="legend-item eff-super">4×</span>
              <span class="legend-item eff-weak">1×</span>
              <span class="legend-item eff-immune">0×</span>
              <span class="legend-item eff-normal">2×</span>
            </span>
          </p>
          <div class="table-scroll">
            <table id="eff-matrix" class="eff-table"></table>
          </div>
        </div>
      </section>

      <!-- ── Interactive play section ─────────────────────────────────────── -->
      <section class="card play-card">

        <div class="play-header">
          <h2 class="section-title">
            Solve the Puzzle
            <span class="section-hint">
              Click a cell, then choose a type · N = notes · ←→↑↓ to navigate · Del to clear
            </span>
          </h2>
          <div id="progress" class="progress-pill">0 / 0</div>
        </div>

        <!-- Interactive grid cells are injected here by app.js -->
        <div id="play-grid" class="grid-container play-grid"></div>

        <!-- Type picker — revealed when a cell is selected ──────────────── -->
        <div id="type-picker" class="type-picker" hidden>
          <div class="picker-top">
            <span id="picker-label" class="picker-label">Select a type for this cell</span>
            <div class="picker-actions">
              <button id="notes-toggle" class="btn-tag" title="Toggle notes mode (N)">
                ✎ Notes
              </button>
              <button id="clear-btn" class="btn-tag btn-tag-danger" disabled>
                ✕ Clear
              </button>
            </div>
          </div>
          <!-- Coloured type buttons injected by app.js -->
          <div id="picker-types" class="picker-types"></div>
        </div>

      </section>

      <!-- ── Action row ────────────────────────────────────────────────────── -->
      <div class="action-row action-spread">
        <button id="reset-btn"         class="btn btn-ghost">Reset</button>
        <button id="show-solution-btn" class="btn btn-ghost">Show Solution</button>
        <button id="submit-btn"        class="btn btn-primary" disabled>
          Submit Solution
        </button>
      </div>

      <!-- ── Validation result ─────────────────────────────────────────────── -->
      <div id="validation-result" class="validation-result" hidden></div>

      <!-- ── Auto-solved solution (revealed by "Show Solution") ───────────── -->
      <section id="solution-section" class="card" hidden>
        <h2 class="section-title">Solution</h2>
        <div id="solution-grid" class="grid-container"></div>
        <div id="verify-result" class="verify-result"></div>
      </section>

    </div><!-- /#puzzle-area -->

  </main>
</div><!-- /.app -->

<script src="/app.js"></script>
</body>
</html>
